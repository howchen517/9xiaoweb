    <style>
        /* 🎀 1. 核心可愛配色與字體設定 🎀 */
        :root {
            --primary-pink: #FF85B3;    /* 櫻花粉 主色 */
            --light-pink: #FFF0F5;      /* 極淺粉 背景色 */
            --primary-purple: #B39DDB;  /* 薰衣草紫 輔助色 */
            --light-purple: #F3E5F5;    /* 淺紫 */
            --bg-white: #FFFFFF;        /* 奶油白 卡片底色 */
            --text-main: #5D4037;       /* 咖啡色 文字 (比純黑更柔和可愛) */
            --text-muted: #8D6E63;      /* 淺咖啡色 次要文字 */
            --gradient-btn: linear-gradient(135deg, #FF85B3 0%, #B39DDB 100%); /* 漸層按鈕 */
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-pink); /* 整個網頁的背景色 */
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 🎀 2. 頂部導航 (加上可愛的圓角邊框) 🎀 */
        .header {
            padding: 15px 20px;
            background: var(--bg-white);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 15px rgba(255, 133, 179, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-pink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 吉祥物小頭像 */
        .brand-mascot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-pink);
        }

        .user-profile {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--light-purple);
            background-size: cover;
            background-position: center;
            border: 2px solid var(--primary-purple);
        }

        /* 🎀 3. 內容區 🎀 */
        .container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px;
        }

        .step { display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .step.active { display: block; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 🎀 4. 遊戲卡片 (加入圖片橫幅) 🎀 */
        .game-card {
            background: var(--bg-white);
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(179, 157, 219, 0.15);
            overflow: hidden; /* 讓圖片不超出圓角 */
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .game-card:active { 
            transform: scale(0.96); 
            border-color: var(--primary-pink);
        }
        
        /* 遊戲圖片橫幅設定 */
        .game-banner {
            width: 100%;
            height: 140px;
            object-fit: cover; /* 讓圖片自動裁切填滿，不變形 */
            display: block;
        }

        .game-info {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-info h3 { margin: 0 0 6px 0; font-size: 18px; color: var(--text-main); }
        .game-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .arrow-icon { color: var(--primary-pink); font-size: 20px; font-weight: bold; }

        /* 🎀 5. 商品列表與輸入框 🎀 */
        .form-panel {
            background: var(--bg-white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(179, 157, 219, 0.15);
            margin-bottom: 24px;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; margin-bottom: 8px; font-size: 14px; 
            font-weight: bold; color: var(--text-main); 
        }
        .input-group input {
            width: 100%; padding: 14px; border-radius: 16px;
            border: 2px solid var(--light-purple); 
            background: var(--light-pink);
            color: var(--text-main); font-size: 16px; box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-group input:focus { 
            outline: none; 
            border-color: var(--primary-pink); 
            background: var(--bg-white);
            box-shadow: 0 0 0 4px rgba(255, 133, 179, 0.2);
        }

        .product-item {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--light-purple);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .product-name { font-size: 16px; font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .price { color: var(--primary-pink); font-weight: bold; font-size: 18px; }
        
        /* 數量控制器 (圓潤可愛版) */
        .qty-ctrl { display: flex; align-items: center; gap: 12px; background: var(--light-pink); padding: 4px; border-radius: 20px;}
        .btn-qty {
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: var(--bg-white); color: var(--primary-purple);
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .btn-qty:active { transform: scale(0.9); }
        .btn-qty.add { background: var(--gradient-btn); color: white; }

        /* 🎀 6. 底部操作區 🎀 */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg-white);
            padding: 15px 20px; box-sizing: border-box;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(179, 157, 219, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .total-box { display: flex; flex-direction: column; }
        .total-label { font-size: 12px; color: var(--text-muted); font-weight: bold;}
        .total-price { font-size: 24px; font-weight: bold; color: var(--primary-pink); }
        
        .btn-next {
            background: var(--gradient-btn); color: white; border: none;
            padding: 14px 32px; border-radius: 30px; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 15px rgba(255, 133, 179, 0.4);
            transition: 0.2s;
        }
        .btn-next:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(255, 133, 179, 0.4); }
        
        .btn-back {
            background: var(--light-pink); color: var(--primary-purple); border: none;
            padding: 14px 20px; border-radius: 30px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .btn-back:active { transform: scale(0.95); }
    </style>

                            <span id="qty-${p.id}" style="width: 24px; text-align: center; font-weight: bold; color: var(--text-main);">0</span>
                            <button class="btn-qty add" onclick="changeQty('${p.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('footer').style.display = 'flex';
        }

        // 4. 增減數量
        function changeQty(productId, delta) {
            let newQty = cart[productId] + delta;
            if (newQty < 0) newQty = 0;
            
            cart[productId] = newQty;
            document.getElementById(`qty-${productId}`).innerText = newQty;
            updateTotal();
        }

        function updateTotal() {
            totalAmount = 0;
            if (currentActiveGame) {
                db[currentActiveGame].products.forEach(p => {
                    totalAmount += cart[p.id] * p.price;
                });
            }
            document.getElementById('total-price').innerText = `NT$ ${totalAmount}`;
        }

        function goBack() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('footer').style.display = 'none';
        }

        // 5. 送出訂單給 LINE Bot
        function submitOrder() {
            const uid = document.getElementById('player-uid').value.trim();
            const nickname = document.getElementById('player-name').value.trim();

            if (!uid) {
                alert("🌸 哎呀！忘記填寫玩家 UID 囉！");
                return;
            }
            if (totalAmount === 0) {
                alert("🛍️ 請至少選擇一個想要的面額喔！");
                return;
            }

            // 整理訂單明細
            let orderDetails = "";
            db[currentActiveGame].products.forEach(p => {
                if (cart[p.id] > 0) {
                    orderDetails += `▪ ${p.name} x ${cart[p.id]}\n`;
                }
            });

            // 組合給 LINE Bot 看的訊息格式 (加入可愛的表情符號)
            const messageText = `🎀【九霄科技 新訂單】🎀\n\n🎮 遊戲：${db[currentActiveGame].name}\n🆔 UID：${uid}\n👤 暱稱：${nickname || '未填'}\n\n🛒 購買內容：\n${orderDetails}\n💰 應付總額：NT$ ${totalAmount}\n\n老闆，我已經確認無誤了，請給我匯款帳號！✨`;

            // 如果在 LINE LIFF 環境內，直接傳送訊息
            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: messageText }])
                    .then(() => {
                        window.alert("🎉 訂單已送出！請在聊天室查看付款資訊。");
                        liff.closeWindow();
                    })
                    .catch((err) => {
                        console.error('送出失敗', err);
                        alert("傳送失敗，請稍後再試 😢");
                    });
            } else {
                // 網頁版測試用
                console.log("模擬送出訊息：\n" + messageText);
                alert("🌸 網頁版測試：訂單已建立 (請看 Console)！\n實際在 LINE 裡會自動將訂單傳送至聊天室。");
            }
        }

        // 啟動
        initApp();
    </script>
</body>
</html>
