    <style>
        /* 🎀 1. 核心可愛配色與字體設定 🎀 */
        :root {
            --primary-pink: #FF85B3;    /* 櫻花粉 主色 */
            --light-pink: #FFF0F5;      /* 極淺粉 背景色 */
            --primary-purple: #B39DDB;  /* 薰衣草紫 輔助色 */
            --light-purple: #F3E5F5;    /* 淺紫 */
            --bg-white: #FFFFFF;        /* 奶油白 卡片底色 */
            --text-main: #5D4037;       /* 咖啡色 文字 */
            --text-muted: #8D6E63;      /* 淺咖啡色 次要文字 */
            --gradient-btn: linear-gradient(135deg, #FF85B3 0%, #B39DDB 100%);
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-pink);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px 20px;
            background: var(--bg-white);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 15px rgba(255, 133, 179, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-home {
            background: var(--light-pink);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary-pink);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(255, 133, 179, 0.2);
            text-decoration: none;
        }
        .btn-home:active { transform: scale(0.9); }
        .btn-home svg { width: 20px; height: 20px; fill: currentColor; }

        .brand {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-pink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-mascot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-pink);
            background-color: var(--light-pink);
        }

        .user-profile {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--light-purple);
            background-size: cover;
            background-position: center;
            border: 2px solid var(--primary-purple);
        }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px;
        }

        .step { display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .step.active { display: block; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .game-card {
            background: var(--bg-white);
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(179, 157, 219, 0.15);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .game-card:active { 
            transform: scale(0.96); 
            border-color: var(--primary-pink);
        }
        
        .game-banner {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .game-info {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-info h3 { margin: 0 0 6px 0; font-size: 18px; color: var(--text-main); }
        .game-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .arrow-icon { color: var(--primary-pink); font-size: 20px; font-weight: bold; }

        .form-panel {
            background: var(--bg-white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(179, 157, 219, 0.15);
            margin-bottom: 24px;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; margin-bottom: 8px; font-size: 14px; 
            font-weight: bold; color: var(--text-main); 
        }
        .input-group input, .input-group select {
            width: 100%; padding: 14px; border-radius: 16px;
            border: 2px solid var(--light-purple); 
            background: var(--light-pink);
            color: var(--text-main); font-size: 16px; box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .input-group input:focus, .input-group select:focus { 
            outline: none; 
            border-color: var(--primary-pink); 
            background: var(--bg-white);
            box-shadow: 0 0 0 4px rgba(255, 133, 179, 0.2);
        }

        .product-item {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--light-purple);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            gap: 12px;
        }
        
        .product-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain; 
            padding: 6px; 
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            background-color: var(--light-purple);
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-name { 
            font-size: 15px; 
            font-weight: bold; 
            margin-bottom: 4px; 
            color: var(--text-main);
        }
        .price { color: var(--primary-pink); font-weight: bold; font-size: 16px; }
        
        .qty-ctrl { display: flex; align-items: center; gap: 12px; background: var(--light-pink); padding: 4px; border-radius: 20px;}
        .btn-qty {
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: var(--bg-white); color: var(--primary-purple);
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .btn-qty:active { transform: scale(0.9); }
        .btn-qty.add { background: var(--gradient-btn); color: white; }

        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg-white);
            padding: 15px 20px; box-sizing: border-box;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(179, 157, 219, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .total-box { display: flex; flex-direction: column; }
        .total-label { font-size: 12px; color: var(--text-muted); font-weight: bold;}
        .total-price { font-size: 24px; font-weight: bold; color: var(--primary-pink); }
        
        .btn-next {
            background: var(--gradient-btn); color: white; border: none;
            padding: 14px 32px; border-radius: 30px; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 15px rgba(255, 133, 179, 0.4);
            transition: 0.2s;
        }
        .btn-next:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(255, 133, 179, 0.4); }
        
        .btn-back {
            background: var(--light-pink); color: var(--primary-purple); border: none;
            padding: 14px 20px; border-radius: 30px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .btn-back:active { transform: scale(0.95); }
    </style>
</head>

                九霄科技 ✨

        </div>
        <div class="user-profile">
            <span id="user-name">讀取中...</span>
            <div id="user-img" class="user-avatar"></div>

        let currentActiveGame = null;

        function generateOrderId() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const randomNum = Math.floor(Math.random() * 900) + 100;
            return `${month}${day}-${randomNum}`;
        }

        async function initApp() {
            try {
                if (LIFF_ID === "請在這裡填入正確的LIFF_ID" || LIFF_ID === "你的_LIFF_ID_填在這裡" || !LIFF_ID) {
                    console.warn("尚未填寫真實的 LIFF ID，目前處於網頁測試模式。");
                    document.getElementById('user-name').innerText = "九霄的客人 (測試)";
                    renderGames();
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                
                const profile = await liff.getProfile();
                document.getElementById('user-name').innerText = profile.displayName;
                if(profile.pictureUrl) {
                    document.getElementById('user-img').style.backgroundImage = `url(${profile.pictureUrl})`;
                }
                renderGames();
            } catch (err) {
                console.error("LIFF Init Error:", err);
                document.getElementById('user-name').innerText = "未登入 (請在官方LINE內開啟)";
                renderGames();
            }
        }

        function renderGames() {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            for (const [gameId, gameInfo] of Object.entries(db)) {
                list.innerHTML += `
                    <div class="game-card" onclick="selectGame('${gameId}')">
                        <img src="${gameInfo.banner}" class="game-banner" alt="${gameInfo.name}">
                        <div class="game-info">
                            <div>
                                <h3>${gameInfo.name}</h3>
                                <p>${gameInfo.desc}</p>
                            </div>
                            <div class="arrow-icon">➔</div>
                        </div>
                    </div>
                `;
            }
        }

        function clearInputs() {
            document.getElementById('uid-uid').value = '';
            document.getElementById('uid-server').value = '';
            document.getElementById('uid-nickname').value = '';

            document.getElementById('acc-nickname').value = '';
            document.getElementById('acc-login-method').value = '';
            document.getElementById('acc-server').value = '';
            document.getElementById('acc-account').value = '';
            document.getElementById('acc-password').value = '';
            document.getElementById('acc-recovery').value = '';

            document.getElementById('payment-method').value = '';
        }

        function selectGame(gameId) {
            if (currentActiveGame !== gameId) {
                currentActiveGame = gameId;
                cart = {}; 
                clearInputs();
            }
            updateTotal();
            
            const loginType = db[gameId].loginType;
            if (loginType === 'uid') {
                document.getElementById('form-uid').style.display = 'block';
                document.getElementById('form-account').style.display = 'none';
                document.getElementById('form-none').style.display = 'none';
            } else if (loginType === 'account') {
                document.getElementById('form-uid').style.display = 'none';
                document.getElementById('form-account').style.display = 'block';
                document.getElementById('form-none').style.display = 'none';
            } else {
                document.getElementById('form-uid').style.display = 'none';
                document.getElementById('form-account').style.display = 'none';
                document.getElementById('form-none').style.display = 'block';
            }

            document.getElementById('selected-game-title').innerText = db[gameId].name;
            document.getElementById('selected-game-img').src = db[gameId].icon;
            
            const pList = document.getElementById('product-list');
            pList.innerHTML = '';
            
            db[gameId].products.forEach(p => {
                if (cart[p.id] === undefined) {
                    cart[p.id] = 0; 
                }
                
                pList.innerHTML += `
                    <div class="product-item">
                        <img src="${p.img}" class="product-icon" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="price">NT$ ${p.price}</div>
                        </div>
                        <div class="qty-ctrl">
                            <button class="btn-qty" onclick="changeQty('${p.id}', -1)">-</button>
                            <span id="qty-${p.id}" style="width: 24px; text-align: center; font-weight: bold; color: var(--text-main);">${cart[p.id]}</span>
                            <button class="btn-qty add" onclick="changeQty('${p.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('footer').style.display = 'flex';
        }

        function changeQty(productId, delta) {
            let newQty = cart[productId] + delta;
            if (newQty < 0) newQty = 0;
            
            cart[productId] = newQty;
            document.getElementById(`qty-${productId}`).innerText = newQty;
            updateTotal();
        }

        function updateTotal() {
            totalAmount = 0;
            if (currentActiveGame) {
                db[currentActiveGame].products.forEach(p => {
                    const qty = parseInt(cart[p.id]) || 0;
                    const price = parseFloat(p.price) || 0;
                    totalAmount += qty * price;
                });
            }
            if (isNaN(totalAmount) || totalAmount < 0) {
                totalAmount = 0;
            }
            document.getElementById('total-price').innerText = `NT$ ${totalAmount}`;
        }

        function goBack() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('footer').style.display = 'none';
        }

        function goHome() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('footer').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createFlexRow(label, value) {
            return {
                "type": "box", "layout": "horizontal", "margin": "sm",
                "contents": [
                    { "type": "text", "text": label, "color": "#8D6E63", "size": "sm", "flex": 1 },
                    { "type": "text", "text": value || '未填寫', "weight": "bold", "size": "sm", "color": "#5D4037", "flex": 2, "wrap": true }
                ]
            };
        }

        function submitOrder() {
            const loginType = db[currentActiveGame].loginType;
            let flexInfoRows = []; 
            
            const orderId = generateOrderId();
            
            if (loginType === 'uid') {
                const uidVal = document.getElementById('uid-uid').value.trim();
                const serverVal = document.getElementById('uid-server').value.trim();
                const nicknameVal = document.getElementById('uid-nickname').value.trim();
                
                if (!uidVal || !serverVal || !nicknameVal) {
                    alert("🌸 哎呀！UID、伺服器和暱稱都要填寫喔！");
                    return;
                }
                flexInfoRows.push(createFlexRow("🆔 UID", uidVal));
                flexInfoRows.push(createFlexRow("🌐 伺服器", serverVal));
                flexInfoRows.push(createFlexRow("👤 暱稱", nicknameVal));
            } else if (loginType === 'account') {
                const nicknameVal = document.getElementById('acc-nickname').value.trim();
                const loginMethodVal = document.getElementById('acc-login-method').value;
                const serverVal = document.getElementById('acc-server').value.trim();
                const accountVal = document.getElementById('acc-account').value.trim();
                const passwordVal = document.getElementById('acc-password').value.trim();
                const recoveryVal = document.getElementById('acc-recovery').value.trim();

                if (!nicknameVal || !loginMethodVal || !serverVal || !accountVal || !passwordVal || !recoveryVal) {
                    alert("🌸 哎呀！帳號密碼登入的所有欄位都必須填寫喔！");
                    return;
                }

                flexInfoRows.push(createFlexRow("👤 暱稱", nicknameVal));
                flexInfoRows.push(createFlexRow("🔑 登入", loginMethodVal));
                flexInfoRows.push(createFlexRow("🌐 伺服器", serverVal));
                flexInfoRows.push(createFlexRow("👤 帳號", accountVal));
                flexInfoRows.push(createFlexRow("🔒 密碼", passwordVal));
                flexInfoRows.push(createFlexRow("🛡️ 復原碼", recoveryVal));
            } else if (loginType === 'none') {
                flexInfoRows.push(createFlexRow("📝 儲值方式", "發送序號 (請至官方儲值中心兌換)"));
            }

            const paymentMethod = document.getElementById('payment-method').value;
            if (!paymentMethod) {
                alert("💳 請選擇一個付款方式喔！");
                return;
            }
            if (totalAmount === 0) {
                alert("🛍️ 請至少選擇一個想要的面額喔！");
                return;
            }

            flexInfoRows.push(createFlexRow("💳 付款", paymentMethod));

            let flexItems = [];
            db[currentActiveGame].products.forEach(p => {
                if (cart[p.id] > 0) {
                    flexItems.push({
                        "type": "box", "layout": "horizontal", "margin": "sm",
                        "contents": [
                            { "type": "text", "text": `▪ ${p.name}`, "size": "sm", "color": "#5D4037", "flex": 3, "wrap": true },
                            { "type": "text", "text": `x ${cart[p.id]}`, "size": "sm", "color": "#FF85B3", "weight": "bold", "flex": 1, "align": "end" }
                        ]
                    });
                }
            });

            // 完美的 Flex Message 組合結構
            const flexMessage = {
                "type": "flex",
                "altText": `🎀 九霄科技 新訂單：${orderId}`, 
                "contents": {
                    "type": "bubble",
                    "size": "kilo",
                    "header": {
                        "type": "box", "layout": "vertical", "backgroundColor": "#FF85B3",
                        "contents": [
                            { "type": "text", "text": "🎀 九霄科技 新訂單 🎀", "weight": "bold", "color": "#FFFFFF", "size": "md", "align": "center" }
                        ]
                    },
                    "body": {
                        "type": "box", "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": `訂單編號：${orderId}`, "size": "xxs", "color": "#B39DDB", "align": "end" },
                            { "type": "text", "text": `🎮 ${db[currentActiveGame].name}`, "weight": "bold", "size": "md", "color": "#5D4037", "margin": "md" },
                            { "type": "separator", "margin": "md" },
                            
                            ...flexInfoRows,

                            { "type": "separator", "margin": "md" },
                            { "type": "text", "text": "🛒 購買內容：", "size": "sm", "color": "#8D6E63", "margin": "md" },
                            
                            ...flexItems,
                            
                            { "type": "separator", "margin": "md", "color": "#FFD1E3" },
                            {
                                "type": "box", "layout": "horizontal", "margin": "md",
                                "contents": [
                                    { "type": "text", "text": "應付總額", "color": "#8D6E63", "size": "md", "flex": 1, "align": "start", "gravity": "center" },
                                    { "type": "text", "text": `NT$ ${totalAmount}`, "weight": "bold", "size": "lg", "color": "#FF85B3", "flex": 2, "align": "end" }
                                ]
                            }
                        ]
                    },
                    "footer": {
                        "type": "box",
                        "layout": "vertical",
                        "backgroundColor": "#FFF0F5",
                        "spacing": "sm",
                        "paddingAll": "md",
                        "contents": [
                            {
                                "type": "button",
                                "style": "primary",
                                "color": "#FF85B3",
                                "height": "sm",
                                "action": {
                                    "type": "message",
                                    "label": "💳 點我取得繳費帳號",
                                    "text": `老闆，我要「${paymentMethod}」的繳費資訊！`
                                }
                            },
                            {
                                "type": "text",
                                "text": "✨ 點擊上方按鈕，系統將自動回覆給您",
                                "wrap": true,
                                "size": "xxs",
                                "color": "#B39DDB",
                                "weight": "bold",
                                "align": "center",
                                "margin": "sm"
                            }
                        ]
                    }
                }
            };

            if (liff && liff.isInClient && liff.isInClient()) {
                liff.sendMessages([flexMessage])
                    .then(() => {
                        window.alert(`🎉 訂單已送出！(編號: ${orderId})\n點擊卡片下方按鈕即可取得繳費帳號唷！`);
                        liff.closeWindow();
                    })
                    .catch((err) => {
                        console.error('送出失敗', err);
                        alert("傳送失敗 😢\n錯誤原因：" + err.message);
                    });
            } else {
                console.log("模擬送出 Flex：\n", JSON.stringify(flexMessage, null, 2));
                alert(`🌸 網頁版測試：Flex 訂單已建立 (編號: ${orderId})！\n這是一個極致完美的卡片版本！`);
            }
        }

        initApp();
    </script>
</body>
</html>
