<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九霄科技｜致力於給顧客最好的服務</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

        /* 🎀 全域防撐破設定 🎀 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* 🎀 1. 核心可愛配色與字體設定 🎀 */
        :root {
            --primary-pink: #FF85B3;    /* 櫻花粉 主色 */
            --light-pink: #FFF0F5;      /* 極淺粉 背景色 */
            --primary-purple: #B39DDB;  /* 薰衣草紫 輔助色 */
            --light-purple: #F3E5F5;    /* 淺紫 */
            --bg-white: #FFFFFF;        /* 奶油白 卡片底色 */
            --text-main: #4A4A4A;       /* 深灰 文字(增加對比度) */
            --text-muted: #8D6E63;      /* 淺咖啡色 次要文字 */
            --gradient-btn: linear-gradient(135deg, #FF85B3 0%, #B39DDB 100%);
            --shadow-soft: 0 10px 30px rgba(179, 157, 219, 0.12); /* 統一的懸浮柔和陰影 */
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Nunito", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
            background: linear-gradient(135deg, #FFF0F5 0%, #F3E5F5 100%); /* 漸層背景 */
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow-x: hidden; /* 強制隱藏水平捲軸，防跑版 */
            letter-spacing: 0.5px;
        }

        .header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.85); /* 提升通透感 */
            backdrop-filter: blur(12px); /* 毛玻璃特效 */
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 4px 20px rgba(255, 133, 179, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-home {
            background: var(--bg-white);
            border: 1px solid var(--light-purple);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary-pink);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(255, 133, 179, 0.1);
            text-decoration: none;
            flex-shrink: 0;
        }
        .btn-home:active { transform: scale(0.9); background: var(--light-pink); }
        .btn-home svg { width: 20px; height: 20px; fill: currentColor; }

        .brand {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary-pink);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .brand-mascot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-white);
            box-shadow: 0 4px 12px rgba(255, 133, 179, 0.2);
            background-color: var(--light-pink);
            flex-shrink: 0;
        }

        /* 🎀 客人頭像按鈕 (點擊查看歷史) 🎀 */
        .user-profile {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(243, 229, 245, 0.6);
            padding: 4px 12px;
            border-radius: 30px;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .user-profile:active { transform: scale(0.95); background: var(--light-purple); border-color: var(--primary-purple); }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-white);
            background-size: cover;
            background-position: center;
            border: 2px solid var(--bg-white);
            box-shadow: 0 4px 12px rgba(179, 157, 219, 0.2);
            flex-shrink: 0;
        }

        .container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            padding-bottom: 140px;
            width: 100%;
        }

        .step { display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .step.active { display: block; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.96) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 🎀 搜尋欄專屬樣式 🎀 */
        .search-container {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }
        .search-container input {
            width: 100%;
            padding: 14px 14px 14px 44px; /* 左邊留空間給放大鏡 */
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 12px rgba(179, 157, 219, 0.08);
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }
        .search-container input::placeholder { color: #BCAAA4; font-weight: 600; }
        .search-container input:focus {
            outline: none;
            border-color: var(--primary-pink);
            background: var(--bg-white);
            box-shadow: 0 0 0 4px rgba(255, 133, 179, 0.15), 0 6px 16px rgba(179, 157, 219, 0.12);
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--primary-purple);
            pointer-events: none;
        }

        .game-card {
            background: var(--bg-white);
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.5); /* 增加反光邊框感 */
            position: relative;
            width: 100%;
        }
        .game-card:active { 
            transform: scale(0.97); 
            border-color: var(--primary-pink);
            box-shadow: 0 4px 15px rgba(255, 133, 179, 0.15);
        }
        
        .game-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--light-purple);
        }

        .game-info {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #FFFFFF 0%, #FAFAFA 100%);
        }

        .game-info h3 { margin: 0 0 6px 0; font-size: 17px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .game-info p { margin: 0; font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }
        .arrow-icon { 
            color: var(--primary-pink); 
            font-size: 16px; 
            background: var(--light-pink);
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            font-weight: bold; 
            flex-shrink: 0;
        }

        .form-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 28px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
        }

        .input-group { margin-bottom: 16px; width: 100%;}
        .input-group label { 
            display: block; margin-bottom: 8px; font-size: 14px; 
            font-weight: 800; color: var(--text-main); 
        }
        .input-group input, .input-group select {
            width: 100%; padding: 14px; border-radius: 18px;
            border: 2px solid transparent; 
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-main); font-size: 14px; box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        .input-group input::placeholder { color: #BCAAA4; font-weight: 400; }
        .input-group input:focus, .input-group select:focus { 
            outline: none; 
            background: var(--bg-white);
            border-color: var(--primary-pink);
            box-shadow: 0 0 0 4px rgba(255, 133, 179, 0.15), inset 0 2px 6px rgba(0,0,0,0.01);
        }

        .product-item {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px rgba(179, 157, 219, 0.08);
            gap: 12px;
            transition: transform 0.2s;
            width: 100%;
        }
        
        .product-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            object-fit: contain; 
            padding: 6px; 
            flex-shrink: 0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
            background-color: var(--light-pink);
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .product-name { 
            font-size: 14px; 
            font-weight: 800; 
            margin-bottom: 4px; 
            letter-spacing: 0.5px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .price { color: var(--primary-pink); font-weight: 800; font-size: 15px; letter-spacing: 0.5px; }
        
        .qty-ctrl { display: flex; align-items: center; gap: 10px; background: rgba(243, 229, 245, 0.5); padding: 5px; border-radius: 20px; flex-shrink: 0;}
        .btn-qty {
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: var(--bg-white); color: var(--primary-purple);
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-qty:active { transform: scale(0.85); }
        .btn-qty.add { background: var(--gradient-btn); color: white; box-shadow: 0 4px 10px rgba(255, 133, 179, 0.3); }

        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 16px 20px; box-sizing: border-box;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            box-shadow: 0 -8px 25px rgba(179, 157, 219, 0.15);
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
        .total-box { display: flex; flex-direction: column; }
        .total-label { font-size: 12px; color: var(--text-muted); font-weight: 800;}
        .total-price { font-size: 22px; font-weight: 800; color: var(--primary-pink); }
        
        .btn-next {
            background: var(--gradient-btn); color: white; border: none;
            padding: 14px 30px; border-radius: 30px; font-size: 15px; font-weight: 800;
            cursor: pointer; box-shadow: 0 6px 16px rgba(255, 133, 179, 0.4);
            transition: all 0.2s;
        }
        .btn-next:active { transform: scale(0.95); box-shadow: 0 3px 8px rgba(255, 133, 179, 0.3); }
        
        .btn-back {
            background: var(--light-pink); color: var(--primary-purple); border: none;
            padding: 14px 20px; border-radius: 30px; font-size: 14px; font-weight: 800; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-back:active { transform: scale(0.95); background: var(--secondary-purple); }

        /* 🎀 歷史訂單浮動面板 🎀 */
        .history-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 2000;
            transition: opacity 0.3s;
        }
        .history-overlay.active { display: flex; }
        
        .history-modal {
            background: var(--light-pink);
            width: 100%; max-height: 85vh;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            padding: 24px; box-sizing: border-box;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .history-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .history-title { font-size: 20px; font-weight: 800; color: var(--primary-purple); }
        .close-history-btn {
            background: var(--bg-white); border: none; width: 32px; height: 32px; border-radius: 50%;
            font-size: 20px; color: var(--text-muted); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .spend-card {
            background: var(--gradient-btn);
            padding: 20px; border-radius: 20px; color: white;
            box-shadow: 0 8px 20px rgba(255, 133, 179, 0.3);
            margin-bottom: 20px; text-align: center;
        }
        .spend-card div { font-size: 13px; font-weight: 700; opacity: 0.9; margin-bottom: 4px; }
        .spend-card h2 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }

        .history-list {
            flex: 1; overflow-y: auto; padding-bottom: 20px;
        }
        .history-item {
            background: var(--bg-white); border-radius: 16px; padding: 16px; margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(179, 157, 219, 0.1); border: 1px solid rgba(255,255,255,0.8);
        }
        .history-item-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .history-date { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 800; }
        .h-pending { background: #FFF3E0; color: #D84315; }
        .h-completed { background: #E8F5E9; color: #2E7D32; }
        .h-cancelled { background: #FFEBEE; color: #C62828; }
        
        .history-game { font-weight: 800; font-size: 16px; color: var(--text-main); margin-bottom: 6px; }
        .history-item-footer { display: flex; justify-content: space-between; align-items: center; }
        .history-orderid { font-size: 12px; color: var(--primary-purple); font-family: monospace; font-weight: bold; }
        .history-price { font-weight: 800; color: var(--primary-pink); font-size: 15px; }

        /* 🎀 送出確認彈出視窗 🎀 */
        .confirm-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 3000;
            transition: opacity 0.3s;
        }
        .confirm-overlay.active { display: flex; }
        
        .confirm-modal {
            background: var(--bg-white);
            width: 85%; max-width: 320px;
            border-radius: 32px;
            padding: 32px 24px; box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            border: 2px solid rgba(255,255,255,0.8);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .confirm-icon { font-size: 50px; margin-bottom: 12px; line-height: 1; }
        .confirm-title { font-size: 20px; font-weight: 800; color: var(--primary-purple); margin: 0 0 10px 0; }
        .confirm-text { font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 0 0 24px 0; line-height: 1.6; }
        .confirm-actions { display: flex; gap: 12px; justify-content: center; }
        
        .btn-cancel-modal { 
            background: var(--light-pink); color: var(--primary-purple); 
            border: none; padding: 12px; border-radius: 24px; 
            font-size: 14px; font-weight: 800; flex: 1; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel-modal:active { transform: scale(0.95); }
        
        .btn-confirm-modal { 
            background: var(--gradient-btn); color: white; 
            border: none; padding: 12px; border-radius: 24px; 
            font-size: 14px; font-weight: 800; flex: 1; cursor: pointer; 
            box-shadow: 0 6px 16px rgba(255, 133, 179, 0.3); transition: 0.2s;
        }
        .btn-confirm-modal:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(255, 133, 179, 0.2); }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <button class="btn-home" onclick="goHome()" title="回到首頁">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 3L20 10.5V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V10.5L12 3ZM12 5.5186L6 11.1444V19H18V11.1444L12 5.5186ZM10 13H14V19H10V13Z"></path>
                </svg>
            </button>
            <div class="brand">
                <img src="https://i.meee.com.tw/R4i6DOW.png" alt="九霄小狐" class="brand-mascot">
                九霄科技 9xiaoGame
            </div>
        </div>
        <div class="user-profile" onclick="openHistoryModal()" title="查看歷史訂單">
            <span id="user-name">讀取中...</span>
            <div id="user-img" class="user-avatar"></div>
        </div>
    </div>

    <div class="history-overlay" id="history-overlay">
        <div class="history-modal">
            <div class="history-header">
                <div class="history-title">🛍️ 我的購物紀錄</div>
                <button class="close-history-btn" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div class="spend-card">
                <div>✨ 累積成功消費 ✨</div>
                <h2 id="history-total-spend">NT$ 0</h2>
            </div>
            <div class="history-list" id="history-list-container">
                <div style="text-align:center; padding: 20px; color: var(--primary-purple); font-weight: bold;">讀取中...</div>
            </div>
        </div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-modal">
            <div class="confirm-icon">🛍️</div>
            <h3 class="confirm-title">確認結帳送出嗎？</h3>
            <p class="confirm-text">
                訂單建立後即無法修改內容，<br>請確認填寫的遊戲資料皆正確喔！
            </p>
            <div class="confirm-actions">
                <button class="btn-cancel-modal" onclick="closeConfirmModal()">再檢查一下</button>
                <button class="btn-confirm-modal" onclick="submitOrder()">確認送出</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="step-1" class="step active">
            <h2 style="font-size: 20px; margin-top: 0; margin-bottom: 16px; color: var(--primary-purple); font-weight: 800; letter-spacing: 1.5px; text-shadow: 0 2px 4px rgba(179,157,219,0.2);">你想儲值哪款遊戲呢？🎮</h2>
            
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M18.031 16.6168L22.3137 20.8995L20.8995 23.1837L16.6168 18.901C15.0769 19.9691 13.1678 20.6025 11.1012 20.6025C5.52391 20.6025 1 16.0786 1 10.5013C1 4.92398 5.52391 0.400085 11.1012 0.400085C16.6786 0.400085 21.2025 4.92398 21.2025 10.5013C21.2025 12.7533 20.4616 14.8327 19.206 16.4526L18.031 16.6168ZM16.0123 15.6989C17.3828 14.3411 18.2025 12.5113 18.2025 10.5013C18.2025 6.57967 15.0229 3.40009 11.1012 3.40009C7.17961 3.40009 4 6.57967 4 10.5013C4 14.4229 7.17961 17.6025 11.1012 17.6025C13.0645 17.6025 14.8434 16.8123 16.1477 15.5392L16.0123 15.6989Z"></path>
                </svg>
                <input type="text" id="game-search-input" placeholder="尋找遊戲名稱..." oninput="filterGames()">
            </div>

            <div id="game-list"></div>
        </div>

        <div id="step-2" class="step">
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="selected-game-img" src="" style="width: 70px; height: 70px; object-fit: cover; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <h2 id="selected-game-title" style="font-size: 22px; margin: 10px 0 0 0; color: var(--primary-pink);"></h2>
            </div>

        function generateOrderId() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const randomNum = Math.floor(Math.random() * 900) + 100;
            return `${month}${day}-${randomNum}`;
        }

        async function initApp() {
            try {
                // 🎀 這裡已經幫您修復邏輯，只要有填就會正常過關 🎀
                if (!LIFF_ID || LIFF_ID === "請在這裡填入正確的LIFF_ID") {
                    console.warn("尚未填寫真實的 LIFF ID，目前處於網頁測試模式。");
                    document.getElementById('user-name').innerText = "九霄的客人 (測試) ▾";
                    currentLineUser = { userId: "test_user_001", displayName: "九霄的客人 (測試)" };
                    renderGames();
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                
                const profile = await liff.getProfile();
                currentLineUser = profile;
                document.getElementById('user-name').innerText = profile.displayName + " ▾";
                if(profile.pictureUrl) {
                    document.getElementById('user-img').style.backgroundImage = `url(${profile.pictureUrl})`;
                }
                renderGames();
            } catch (err) {
                console.error("LIFF Init Error:", err);
                document.getElementById('user-name').innerText = "未登入 (請在官方LINE內開啟)";
                renderGames();
            }
        }

        function renderGames(filterText = '') {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            const lowerFilter = filterText.toLowerCase().trim();
            let hasResult = false;

            for (const [gameId, gameInfo] of Object.entries(db)) {
                if (gameInfo.name.toLowerCase().includes(lowerFilter)) {
                    hasResult = true;
                    list.innerHTML += `
                        <div class="game-card" onclick="selectGame('${gameId}')">
                            <img src="${gameInfo.banner}" class="game-banner" alt="${gameInfo.name}">
                            <div class="game-info">
                                <div>
                                    <h3>${gameInfo.name}</h3>
                                    <p>${gameInfo.desc}</p>
                                </div>
                                <div class="arrow-icon">➔</div>
                            </div>
                        </div>
                    `;
                }
            }

            if (!hasResult) {
                list.innerHTML = `<div style="text-align: center; padding: 40px 20px; color: var(--text-muted); font-weight: bold; font-size: 15px;">🔍 找不到包含「${filterText}」的遊戲唷<br><span style="font-size: 12px; font-weight: normal; margin-top: 8px; display: inline-block;">請確認名稱是否有錯字</span></div>`;
            }
        }

        function filterGames() {
            const query = document.getElementById('game-search-input').value;
            renderGames(query);
        }

        function clearInputs() {
            document.getElementById('uid-uid').value = '';
            document.getElementById('uid-server').value = '';
            document.getElementById('uid-nickname').value = '';
            document.getElementById('acc-nickname').value = '';
            document.getElementById('acc-login-method').value = '';
            document.getElementById('acc-server').value = '';

            document.getElementById('acc-password').value = '';
            document.getElementById('acc-recovery').value = '';
            document.getElementById('payment-method').value = '';
        }

        function selectGame(gameId) {
            if (currentActiveGame !== gameId) {
                currentActiveGame = gameId;
                cart = {}; 
                clearInputs();
            }
            updateTotal();
            
            const loginType = db[gameId].loginType;
            if (loginType === 'uid') {
                document.getElementById('form-uid').style.display = 'block';
                document.getElementById('form-account').style.display = 'none';
                document.getElementById('form-none').style.display = 'none';
            } else if (loginType === 'account') {
                document.getElementById('form-uid').style.display = 'none';
                document.getElementById('form-account').style.display = 'block';
                document.getElementById('form-none').style.display = 'none';
            } else {
                document.getElementById('form-uid').style.display = 'none';
                document.getElementById('form-account').style.display = 'none';
                document.getElementById('form-none').style.display = 'block';
            }

            document.getElementById('selected-game-title').innerText = db[gameId].name;
            document.getElementById('selected-game-img').src = db[gameId].icon;
            
            const pList = document.getElementById('product-list');
            pList.innerHTML = '';
            
            db[gameId].products.forEach(p => {
                if (cart[p.id] === undefined) {
                    cart[p.id] = 0; 
                }
                
                pList.innerHTML += `
                    <div class="product-item">
                        <img src="${p.img}" class="product-icon" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="price">NT$ ${p.price}</div>
                        </div>
                        <div class="qty-ctrl">
                            <button class="btn-qty" onclick="changeQty('${p.id}', -1)">-</button>
                            <span id="qty-${p.id}" style="width: 24px; text-align: center; font-weight: bold; color: var(--text-main);">${cart[p.id]}</span>
                            <button class="btn-qty add" onclick="changeQty('${p.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('footer').style.display = 'flex';
        }

        function changeQty(productId, delta) {
            let newQty = cart[productId] + delta;
            if (newQty < 0) newQty = 0;
            
            cart[productId] = newQty;
            document.getElementById(`qty-${productId}`).innerText = newQty;
            updateTotal();
        }

        function updateTotal() {
            totalAmount = 0;
            if (currentActiveGame) {
                db[currentActiveGame].products.forEach(p => {
                    const qty = parseInt(cart[p.id]) || 0;
                    const price = parseFloat(p.price) || 0;
                    totalAmount += qty * price;
                });
            }
            if (isNaN(totalAmount) || totalAmount < 0) {
                totalAmount = 0;
            }
            document.getElementById('total-price').innerText = `NT$ ${totalAmount}`;
        }

        function goBack() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('footer').style.display = 'none';
        }

        function goHome() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('footer').style.display = 'none';
            
            const searchInput = document.getElementById('game-search-input');
            if(searchInput) {
                searchInput.value = '';
                renderGames();
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createFlexRow(label, value) {
            return {
                "type": "box", "layout": "horizontal", "margin": "sm",
                "contents": [
                    { "type": "text", "text": label, "color": "#8D6E63", "size": "sm", "flex": 1 },
                    { "type": "text", "text": value || '未填寫', "weight": "bold", "size": "sm", "color": "#5D4037", "flex": 2, "wrap": true }
                ]
            };
        }

        window.openHistoryModal = async function() {
            if (!currentLineUser) {
                return alert("⚠️ 請先透過 LINE 登入才能查看專屬您的歷史紀錄唷！");
            }
            
            // 🎀 修復：不再將真實網址視為錯誤 🎀
            if (!GAS_URL || GAS_URL === "請填入GAS_URL") {
                return alert("⚠️ 老闆，您尚未填寫 Google Apps Script 網址，目前無法連線到試算表讀取資料喔！");
            }

            document.getElementById('history-overlay').classList.add('active');
            const historyContainer = document.getElementById('history-list-container');
            historyContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--primary-purple); font-weight: bold; font-size: 15px;">🔄 正在從雲端抓取您的專屬紀錄...</div>';

            try {
                const response = await fetch(`${GAS_URL}?action=getHistory&uid=${currentLineUser.userId}`);
                const myOrders = await response.json();
                
                let totalSpent = 0;
                
                myOrders.forEach(o => {
                    if (o.status === 'completed' || o.status === '已完成') {
                        totalSpent += parseFloat(o.totalAmount) || 0;
                    }
                });

                document.getElementById('history-total-spend').innerText = `NT$ ${totalSpent.toLocaleString()}`;

                if (myOrders.length === 0) {
                    historyContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted); font-weight: bold; font-size: 15px;">🌸 您目前還沒有下過訂單唷！快去選購吧！</div>';
                    return;
                }

                let html = '';
                myOrders.forEach(o => {
                    const d = new Date(o.timestamp);
                    let dateStr = "未知時間";
                    if (!isNaN(d.getTime())) {
                        dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    }

                    let statusHtml = '';
                    if (o.status === 'pending' || o.status === '處理中') statusHtml = '<span class="badge h-pending">🟡 處理中</span>';
                    else if (o.status === 'completed' || o.status === '已完成') statusHtml = '<span class="badge h-completed">🟢 已完成</span>';
                    else statusHtml = '<span class="badge h-cancelled">🔴 已取消</span>';

                    html += `
                        <div class="history-item">
                            <div class="history-item-header">
                                <span class="history-date">🕒 ${dateStr}</span>
                                ${statusHtml}
                            </div>
                            <div class="history-game">🎮 ${o.gameName}</div>
                            <div class="history-item-footer">
                                <span class="history-orderid">#${o.orderId}</span>
                                <span class="history-price">NT$ ${o.totalAmount}</span>
                            </div>
                        </div>
                    `;
                });
                historyContainer.innerHTML = html;

            } catch (err) {
                console.error("抓取歷史紀錄失敗:", err);
                historyContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: red; font-weight:bold;">❌ 抓取失敗，請確認 Google 表單設定正確。</div>';
            }
        }

        window.closeHistoryModal = function() {
            document.getElementById('history-overlay').classList.remove('active');
        }

            const loginType = db[currentActiveGame].loginType;

                if (!document.getElementById('uid-uid').value.trim() || !document.getElementById('uid-server').value.trim() || !document.getElementById('uid-nickname').value.trim()) {

            document.getElementById('confirm-overlay').classList.remove('active');

        async function submitOrder() {
            closeConfirmModal();

            const loginType = db[currentActiveGame].loginType;
            let flexInfoRows = []; 
            const orderId = generateOrderId();
            
            let cloudOrderData = {
                timestamp: new Date().toISOString(),
                orderId: orderId,
                lineUserId: currentLineUser ? currentLineUser.userId : 'test_user_001',
                customerName: currentLineUser ? currentLineUser.displayName : '匿名訪客',
                gameName: db[currentActiveGame].name,
                totalAmount: totalAmount,
                paymentMethod: document.getElementById('payment-method').value || '未填寫',
                status: '處理中',
                cart: {},
                formDetails: {}
            };
            
            if (loginType === 'uid') {
                const uidVal = document.getElementById('uid-uid').value.trim();
                const serverVal = document.getElementById('uid-server').value.trim();
                const nicknameVal = document.getElementById('uid-nickname').value.trim();
                
                flexInfoRows.push(createFlexRow("🆔 UID", uidVal));
                flexInfoRows.push(createFlexRow("🌐 伺服器", serverVal));
                flexInfoRows.push(createFlexRow("👤 暱稱", nicknameVal));
                cloudOrderData.formDetails = { '玩家 UID': uidVal, '伺服器': serverVal, '遊戲暱稱': nicknameVal };

            } else if (loginType === 'account') {
                const nicknameVal = document.getElementById('acc-nickname').value.trim();
                const loginMethodVal = document.getElementById('acc-login-method').value;
                const serverVal = document.getElementById('acc-server').value.trim();
                const accountVal = document.getElementById('acc-account').value.trim();
                const passwordVal = document.getElementById('acc-password').value.trim();
                const recoveryVal = document.getElementById('acc-recovery').value.trim();

                flexInfoRows.push(createFlexRow("👤 暱稱", nicknameVal));
                flexInfoRows.push(createFlexRow("🔑 登入", loginMethodVal));
                flexInfoRows.push(createFlexRow("🌐 伺服器", serverVal));
                flexInfoRows.push(createFlexRow("👤 帳號", accountVal));
                flexInfoRows.push(createFlexRow("🔒 密碼", passwordVal));
                flexInfoRows.push(createFlexRow("🛡️ 復原碼", recoveryVal));
                cloudOrderData.formDetails = { '遊戲暱稱': nicknameVal, '登入方式': loginMethodVal, '伺服器': serverVal, '登入帳號': accountVal, '登入密碼': passwordVal, '備用碼': recoveryVal };

            } else if (loginType === 'none') {
                flexInfoRows.push(createFlexRow("📝 儲值", "發送序號 (請至官網兌換)"));
            }

            flexInfoRows.push(createFlexRow("💳 付款", cloudOrderData.paymentMethod));

            let flexItems = [];
            db[currentActiveGame].products.forEach(p => {
                if (cart[p.id] > 0) {
                    flexItems.push({
                        "type": "box", "layout": "horizontal", "margin": "sm",
                        "contents": [
                            { "type": "text", "text": `▪ ${p.name}`, "size": "sm", "color": "#5D4037", "flex": 3, "wrap": true },
                            { "type": "text", "text": `x ${cart[p.id]}`, "size": "sm", "color": "#FF85B3", "weight": "bold", "flex": 1, "align": "end" }
                        ]
                    });
                    cloudOrderData.cart[p.name] = cart[p.id];
                }
            });

            // 🎀 修復：不再將真實網址視為錯誤，只要有值就發送 🎀
            if (GAS_URL && GAS_URL !== "請填入GAS_URL") {
                try {
                    fetch(GAS_URL, {
                        redirect: "follow",
                        method: 'POST',
                        headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                        body: JSON.stringify(cloudOrderData)
                    });
                    console.log("☁️ 訂單已發送至 Google 試算表");
                } catch (e) {
                    console.error("寫入 Google 表單失敗:", e);
                }
            }

            const flexMessage = {
                "type": "flex",
                "altText": `🎀 九霄科技 新訂單：${orderId}`, 
                "contents": {
                    "type": "bubble",
                    "size": "kilo",
                    "header": {
                        "type": "box", "layout": "vertical", "backgroundColor": "#FF85B3",
                        "contents": [
                            { "type": "text", "text": "🎀 九霄科技 新訂單 🎀", "weight": "bold", "color": "#FFFFFF", "size": "md", "align": "center" }
                        ]
                    },
                    "body": {
                        "type": "box", "layout": "vertical",
                        "contents": [
                            {
                                "type": "box", "layout": "horizontal", "margin": "md",
                                "contents": [
                                    { "type": "text", "text": "訂單編號", "color": "#8D6E63", "size": "xs", "flex": 2, "gravity": "center" },
                                    { "type": "text", "text": orderId, "weight": "bold", "size": "sm", "color": "#5D4037", "flex": 4, "gravity": "center" },
                                    { 
                                        "type": "text", 
                                        "text": "📋 複製", 
                                        "color": "#FF85B3", 
                                        "size": "sm", 
                                        "weight": "bold", 
                                        "align": "end",
                                        "gravity": "center",
                                        "flex": 2,
                                        "action": {
                                            "type": "clipboard",
                                            "label": "複製",
                                            "clipboardText": orderId
                                        }
                                    }
                                ]
                            },
                            { "type": "separator", "margin": "md" },
                            { "type": "text", "text": `🎮 ${db[currentActiveGame].name}`, "weight": "bold", "size": "md", "color": "#5D4037", "margin": "md" },
                            { "type": "separator", "margin": "md" },
                            
                            ...flexInfoRows,

                            { "type": "separator", "margin": "md" },
                            { "type": "text", "text": "🛒 購買內容：", "size": "sm", "color": "#8D6E63", "margin": "md" },
                            
                            ...flexItems,
                            
                            { "type": "separator", "margin": "md", "color": "#FFD1E3" },
                            {
                                "type": "box", "layout": "horizontal", "margin": "md",
                                "contents": [
                                    { "type": "text", "text": "應付總額", "color": "#8D6E63", "size": "md", "flex": 1, "align": "start", "gravity": "center" },
                                    { "type": "text", "text": `NT$ ${totalAmount}`, "weight": "bold", "size": "lg", "color": "#FF85B3", "flex": 2, "align": "end" }
                                ]
                            }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical", "backgroundColor": "#FFF0F5",
                        "contents": [
                            { "type": "text", "text": "✨ 訂單確認中！請稍候 . . . ", "wrap": true, "size": "xs", "color": "#B39DDB", "weight": "bold", "align": "center" }
                        ]
                    }
                }
            };

            // 🎀 修復：不再將真實 ID 視為錯誤 🎀
            if (!LIFF_ID || LIFF_ID === "請在這裡填入正確的LIFF_ID") {
                return alert(`🌸 網頁版測試：Flex 訂單已建立 (編號: ${orderId})！\n如果有設定好 Google 表單網址，這筆資料就會進到您的表單喔！`);
            }

            if (liff && liff.isInClient && liff.isInClient()) {
                liff.sendMessages([flexMessage])
                    .then(() => {
                        window.alert(`🎉 訂單已送出！(編號: ${orderId})\n請在聊天室查看付款資訊。`);
                        liff.closeWindow();
                    })
                    .catch((err) => {
                        console.error('送出失敗', err);
                        alert("傳送失敗 😢\n錯誤原因：" + err.message);
                    });
            } else {
                alert(`🌸 網頁版測試：Flex 訂單已建立 (編號: ${orderId})！您可以點擊右上角大頭貼查看這筆歷史紀錄。`);
            }
        }

        initApp();
    </script>
</body>
</html>
